api:
  dashboard: true
  insecure: true

# Direct ports mode - services use their native ports
# Removed 80/443 entry points as Caddy reverse proxy is disabled
entryPoints:
  dashboard:
    address: ":9090"
  # Add direct port entry points for services that need them
  # Services will expose their own ports directly

providers:
  file:
    directory: "/etc/traefik/dynamic"
    watch: true
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy

log:
  level: INFO

accessLog: {}
