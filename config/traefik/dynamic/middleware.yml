# Middleware Configuration for Direct Ports Mode
# Caddy reverse proxy is disabled - services use direct ports

# Direct ports mode:
# - No 80/443 reverse proxy
# - Services expose their native ports directly
# - Traefik is still available for services that need routing

http:
  middlewares:
    # Security headers middleware (optional, can be applied to individual services)
    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"
        customResponseHeaders:
          X-Robots-Tag: "none,noindex,nofollow,noimageindex"
          X-XSS-Protection: "1; mode=block"
          X-Frame-Options: "SAMEORIGIN"
          X-Content-Type-Options: "nosniff"
          Referrer-Policy: "strict-origin-when-cross-origin"
          Permissions-Policy: "geolocation=(), midi=(), sync-xhr=(), microphone=(), camera=(), magnetometer=(), gyroscope=(), speaker=(), vibrate=(), fullscreen=(self)"

    # Rate limiting (optional, for services that need it)
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s
