---
# Homelab Services
# Generated by Homelab Installer
# Services are automatically discovered via Traefik labels
# To use manual config, replace DOMAIN with your actual domain

- Homelab Services:
    - Traefik:
        href: https://traefik.${DOMAIN}
        description: Reverse Proxy & Dashboard
        icon: traefik.png
    - Portainer:
        href: https://portainer.${DOMAIN}
        description: Container Management
        icon: portainer.png
    - Ollama:
        href: https://ollama.${DOMAIN}
        description: Local AI Models
        icon: ollama.png
    - Keycloak:
        href: https://keycloak.${DOMAIN}
        description: Identity Provider
        icon: keycloak.png

- Media:
    - Jellyfin:
        href: https://jellyfin.${DOMAIN}
        description: Media Server
        icon: jellyfin.png
    - Sonarr:
        href: https://sonarr.${DOMAIN}
        description: TV Show Management
        icon: sonarr.png
    - Radarr:
        href: https://radarr.${DOMAIN}
        description: Movie Management
        icon: radarr.png
    - Lidarr:
        href: https://lidarr.${DOMAIN}
        description: Music Management
        icon: lidarr.png
    - Jellyseerr:
        href: https://jellyseerr.${DOMAIN}
        description: Media Requests
        icon: jellyseerr.png
        widgets:
            - type: jellyseerr
              url: https://jellyseerr.${DOMAIN}
              key: YOUR_API_KEY_HERE

- Monitoring:
    - UptimeKuma:
        href: https://uptimekuma.${DOMAIN}
        description: Uptime Monitoring
        icon: uptimekuma.png
    - Grafana:
        href: https://grafana.${DOMAIN}
        description: Metrics Dashboard
        icon: grafana.png

- Security:
    - Vaultwarden:
        href: https://vault.${DOMAIN}
        description: Password Manager
        icon: vaultwarden.png
    - Authelia:
        href: https://auth.${DOMAIN}
        description: 2FA & SSO
        icon: authelia.png

- Storage:
    - Nextcloud:
        href: https://nextcloud.${DOMAIN}
        description: Files & Documents
        icon: nextcloud.png
    - MinIO:
        href: https://minio.${DOMAIN}
        description: S3 Storage
        icon: minio.png

- AI:
    - OpenWebUI:
        href: https://openwebui.${DOMAIN}
        description: AI Chat Interface
        icon: openwebui.png

- Game Servers:
    - Crafty:
        href: https://crafty.${DOMAIN}
        description: Minecraft Manager
        icon: crafty.png
