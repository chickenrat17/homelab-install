# Middleware Configuration for Direct Ports Mode
# Caddy reverse proxy is disabled - services use direct ports

# Direct ports mode:
# - No 80/443 reverse proxy
# - Services expose their native ports directly
# - Traefik is still available for services that need routing

http:
  middlewares:
    # Keycloak forward auth - protect services with Keycloak login
    # Note: This may need adjustment in direct ports mode
    keycloak-auth:
      forwardAuth:
        address: "http://keycloak:8080/realms/homelab/protocol/openid-connect/auth"
        trustForwardHeader: true
        authResponseHeaders:
          - "X-Forwarded-User"
          - "X-Forwarded-Email"
          - "X-Forwarded-Preferred-Username"

    # Basic security headers
    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"

    # Rate limiting (optional, for services that need it)
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s
