# OpenClaw Docker Compose
# Homelab assistant

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - TZ=America/Chicago
    volumes:
      - openclaw-data:/app/data
    networks:
      - proxy

volumes:
  openclaw-data:

networks:
  proxy:
    external: true
