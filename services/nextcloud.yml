# Nextcloud Docker Compose
# Files & Documents

services:
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "8083:80"
    environment:
      - TZ=America/Chicago
    volumes:
      - nextcloud-data:/var/www/html
    networks:
      - proxy

volumes:
  nextcloud-data:

networks:
  proxy:
    external: true
