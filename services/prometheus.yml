# Prometheus Docker Compose
# Monitoring metrics collection

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      - TZ=America/Chicago
    volumes:
      - prometheus-data:/prometheus
    networks:
      - proxy

volumes:
  prometheus-data:

networks:
  proxy:
    external: true
