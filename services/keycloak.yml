# Keycloak Docker Compose
# Identity provider

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: unless-stopped
    ports:
      - "8082:8080"
      - "8444:8443"
    environment:
      - TZ=America/Chicago
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks:
      - proxy

volumes:
  keycloak-data:

networks:
  proxy:
    external: true
