# Lidarr Docker Compose
# Music collection management


services:
  lidarr:
    image: linuxserver/lidarr:develop
    container_name: lidarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - lidarr-config:/config
      - /mnt/media:/media
    ports:
      - "8686:8686"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lidarr.rule=Host(`lidarr.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.lidarr.entryPoints=websecure"
      - "traefik.http.routers.lidarr.tls=true"
      - "traefik.http.routers.lidarr.middlewares=security-headers"
      - "traefik.http.services.lidarr.loadbalancer.server.port=8686"

networks:
  proxy:
    external: true

volumes:
  lidarr-config:
    name: lidarr-config