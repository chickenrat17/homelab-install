# Grafana Docker Compose
# Metrics dashboard

services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TZ=America/Chicago
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - proxy

volumes:
  grafana-data:

networks:
  proxy:
    external: true
