# Navidrome Docker Compose
# Music streaming server

services:
  navidrome:
    image: deluan/navidrome:develop
    container_name: navidrome
    restart: unless-stopped
    ports:
      - "4533:4533"
    environment:
      - TZ=America/Chicago
    volumes:
      - navidrome-data:/data
      - /mnt/music:/mnt/music:ro
    networks:
      - proxy

volumes:
  navidrome-data:

networks:
  proxy:
    external: true
