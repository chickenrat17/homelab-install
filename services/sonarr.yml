# Sonarr Docker Compose
# TV show management and automation

services:
  sonarr:
    image: linuxserver/sonarr:develop
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - sonarr-config:/config
      - /mnt/media:/media
    ports:
      - "8989:8989"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(\"sonarr.$${DOMAIN:-localhost}\")"
      - "traefik.http.routers.sonarr.entryPoints=websecure"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.middlewares=security-headers"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"

networks:
  proxy:
    external: true

volumes:
  sonarr-config:
    name: sonarr-config
