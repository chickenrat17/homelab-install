# Home Assistant Docker Compose
# Smart home hub

services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    ports:
      - "8123:8123"
    environment:
      - TZ=America/Chicago
    volumes:
      - homeassistant-data:/config
    networks:
      - proxy

volumes:
  homeassistant-data:

networks:
  proxy:
    external: true
