# AdGuard Home Docker Compose
# DNS-level ad blocking and parental control


services:
  adguard:
    image: adguard/adguardhome:v0.107.56
    container_name: adguard
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
    volumes:
      - adguard-work:/opt/adguardhome/work
      - adguard-conf:/opt/adguardhome/conf
    networks:
      - proxy
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3010:3000/tcp"
      - "853:853/tcp"
      - "784:784/udp"
      - "8053:8053/udp"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adguard.rule=Host(`adguard.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.adguard.entryPoints=web,websecure"
      - "traefik.http.routers.adguard.tls=true"
      - "traefik.http.routers.adguard.middlewares=security-headers"
      - "traefik.http.services.adguard.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true

volumes:
  adguard-work:
    name: adguard-work
  adguard-conf:
    name: adguard-conf