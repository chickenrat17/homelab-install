services:
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - /home/hallmikey/homelab-install/config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /home/hallmikey/homelab-install/config/caddy/caddy-data:/data:rw
      - /home/hallmikey/homelab-install/config/caddy/caddy-config:/config:rw
    networks:
      - proxy
    labels:
      - "traefik.enable=false"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:2019/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
networks:
  proxy:
    external: true
