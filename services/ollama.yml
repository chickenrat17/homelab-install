# Ollama Docker Compose
# Local AI model inference

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - TZ=America/Chicago
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - proxy

volumes:
  ollama-data:

networks:
  proxy:
    external: true
