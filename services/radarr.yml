# Radarr Docker Compose
# Movie management and automation


services:
  radarr:
    image: linuxserver/radarr:develop
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - radarr-config:/config
      - /mnt/media:/media
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.radarr.entryPoints=websecure"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.middlewares=security-headers"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"

networks:
  proxy:
    external: true

volumes:
  radarr-config:
    name: radarr-config