# Vaultwarden Docker Compose
# Password manager

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - TZ=America/Chicago
    volumes:
      - vaultwarden-data:/data
    networks:
      - proxy

volumes:
  vaultwarden-data:

networks:
  proxy:
    external: true
