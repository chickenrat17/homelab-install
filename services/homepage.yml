# Homepage Docker Compose
# Modern homelab dashboard


services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.0.4
    container_name: homepage
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
      # Allow access from IP, localhost, and domain variants
      - HOMEPAGE_ALLOWED_HOSTS=home.${DOMAIN:-localhost},localhost,${IP:-192.168.1.1}
    volumes:
      - homepage-config:/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`home.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.homepage.entryPoints=web,websecure"
      - "traefik.http.routers.homepage.tls=true"
      - "traefik.http.routers.homepage.middlewares=security-headers"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  proxy:
    external: true

volumes:
  homepage-config:
    name: homepage-config