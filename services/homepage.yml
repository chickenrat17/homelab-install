# Homepage Docker Compose
# Main dashboard

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:v0.10.4
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TZ=America/Chicago
    volumes:
      - homepage-config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy

volumes:
  homepage-config:

networks:
  proxy:
    external: true
