# OpenWebUI Docker Compose
# AI chat interface

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.5.0
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=America/Chicago
    volumes:
      - openwebui-data:/app/backend/data
    networks:
      - proxy

volumes:
  openwebui-data:

networks:
  proxy:
    external: true
