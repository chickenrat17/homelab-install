# ntfy Docker Compose
# Push notifications service


services:
  ntfy:
    image: binaries.ory.sh/ntfy:v2.6.0
    container_name: ntfy
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
    volumes:
      - ntfy-cache:/var/cache/ntfy
      - ntfy-data:/var/lib/ntfy
    networks:
      - proxy
    ports:
      - "2586:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ntfy.rule=Host(`ntfy.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.ntfy.entryPoints=web,websecure"
      - "traefik.http.routers.ntfy.tls=true"
      - "traefik.http.routers.ntfy.middlewares=security-headers"
      - "traefik.http.services.ntfy.loadbalancer.server.port=80"

networks:
  proxy:
    external: true

volumes:
  ntfy-cache:
    name: ntfy-cache
  ntfy-data:
    name: ntfy-data