services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8081:80"
    environment:
      - TZ=America/Chicago
      - WEBPASSWORD=admin
      - SERVERIP=192.168.68.95
      - DNS1=127.0.0.1#53
      - DNS2=8.8.8.8
    volumes:
      - /home/hallmikey/homelab-install/config/pihole/pihole-data:/etc/pihole
      - /home/hallmikey/homelab-install/config/pihole/dnsmasq.d:/etc/dnsmasq.d
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pihole.rule=Host(`pihole.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.pihole.entryPoints=websecure"
      - "traefik.http.routers.pihole.tls=true"
      - "traefik.http.services.pihole.loadbalancer.server.port=80"

networks:
  proxy:
    external: true

volumes:
  pihole-data:
    name: pihole-data
