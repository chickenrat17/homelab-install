# Authelia Docker Compose
# Two-factor authentication portal

services:
  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    ports:
      - "80:80"
      - "9091:9091"
    environment:
      - TZ=America/Chicago
    volumes:
      - authelia-config:/config
    networks:
      - proxy

volumes:
  authelia-config:

networks:
  proxy:
    external: true
